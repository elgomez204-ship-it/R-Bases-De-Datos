<svg width="800" height="350" xmlns="http://www.w3.org/2000/svg">

<style>
.entity { fill:white; stroke:black; stroke-width:2; }
.text { font-size:12px; text-anchor:middle; }
.title { font-weight:bold; }
.line { stroke:black; stroke-width:2; }
</style>

<!-- Paciente -->
<rect class="entity" x="50" y="100" width="180" height="100"></rect>
<text class="title text" x="140" y="120">Paciente</text>
<text class="text" x="140" y="140">id</text>
<text class="text" x="140" y="155">nombre</text>
<text class="text" x="140" y="170">apellidos</text>

<!-- Médico -->
<rect class="entity" x="300" y="50" width="180" height="100"></rect>
<text class="title text" x="390" y="70">Médico</text>
<text class="text" x="390" y="90">id</text>
<text class="text" x="390" y="105">nombre</text>
<text class="text" x="390" y="120">especialidad</text>

<!-- Cita -->
<rect class="entity" x="300" y="180" width="180" height="110"></rect>
<text class="title text" x="390" y="200">Cita</text>
<text class="text" x="390" y="220">id</text>
<text class="text" x="390" y="235">fecha</text>
<text class="text" x="390" y="250">paciente_id</text>
<text class="text" x="390" y="265">medico_id</text>

<!-- Tratamiento -->
<rect class="entity" x="550" y="120" width="180" height="90"></rect>
<text class="title text" x="640" y="140">Tratamiento</text>
<text class="text" x="640" y="160">id</text>
<text class="text" x="640" y="175">nombre</text>

<!-- Relaciones -->
<line class="line" x1="230" y1="140" x2="300" y2="220"></line>
<line class="line" x1="480" y1="100" x2="390" y2="180"></line>
<line class="line" x1="480" y1="230" x2="550" y2="160"></line>

</svg>