<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagrama exportado</title>
<style>
body {
  margin: 0;
  padding: 20px;
  background: #f3f3f7;
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
}
.page {
  position: relative;
  background: #ffffff;
  border: 1px solid #d1d5db;
  box-shadow: 0 2px 4px rgba(0,0,0,.1);
  width: 900px;
  height: 400px;
  overflow: visible;
}

/* formas básicas */
.shape {
  position: absolute;
  min-width: 120px;
  min-height: 40px;
  padding: 6px 10px;
  background: #ffffff;
  border-radius: 4px;
  border: 1px solid #9ca3af;
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}

.shape.entity {
  width: 220px;
  min-height: 80px;
  background: #ffffff;
  border: 2px solid #111827;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 0;
}

.entity-header {
  background: #f3f4f6;
  padding: 4px;
  font-weight: bold;
  text-align: center;
  border-bottom: 1px solid #e5e7eb;
}

.entity-properties {
  padding: 4px;
}

.entity-property {
  display: grid;
  grid-template-columns: 14px 1fr 14px;
  padding: 2px 0;
}

.port {
  width: 8px;
  height: 8px;
  border: 1px solid black;
  border-radius: 50%;
}

.port-left { justify-self: start; }
.port-right { justify-self: end; }

.arrow {
  position: absolute;
  height: 2px;
  background: black;
}
.arrow::after {
  content: "";
  position: absolute;
  right: 0;
  top: -4px;
  border-left: 8px solid black;
  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
}
</style>
</head>

<body>
<div class="page">

<!-- PACIENTE -->
<div class="shape entity" style="left:40px;top:120px;">
  <div class="entity-header">Paciente</div>
  <div class="entity-properties">
    <div class="entity-property">
      <div class="port port-left"></div>
      <div>id</div>
      <div class="port port-right"></div>
    </div>
    <div class="entity-property">
      <div class="port port-left"></div>
      <div>nombre</div>
      <div class="port port-right"></div>
    </div>
    <div class="entity-property">
      <div class="port port-left"></div>
      <div>apellidos</div>
      <div class="port port-right"></div>
    </div>
  </div>
</div>

<!-- MEDICO -->
<div class="shape entity" style="left:320px;top:40px;">
  <div class="entity-header">Medico</div>
  <div class="entity-properties">
    <div class="entity-property">
      <div class="port port-left"></div>
      <div>id</div>
      <div class="port port-right"></div>
    </div>
    <div class="entity-property">
      <div class="port port-left"></div>
      <div>nombre</div>
      <div class="port port-right"></div>
    </div>
    <div class="entity-property">
      <div class="port port-left"></div>
      <div>especialidad</div>
      <div class="port port-right"></div>
    </div>
  </div>
</div>

<!-- CITA -->
<div class="shape entity" style="left:320px;top:200px;">
  <div class="entity-header">Cita</div>
  <div class="entity-properties">
    <div class="entity-property">
      <div class="port port-left"></div>
      <div>id</div>
      <div class="port port-right"></div>
    </div>
    <div class="entity-property">
      <div class="port port-left"></div>
      <div>fecha</div>
      <div class="port port-right"></div>
    </div>
    <div class="entity-property">
      <div class="port port-left"></div>
      <div>paciente_id</div>
      <div class="port port-right"></div>
    </div>
    <div class="entity-property">
      <div class="port port-left"></div>
      <div>medico_id</div>
      <div class="port port-right"></div>
    </div>
  </div>
</div>

<!-- TRATAMIENTO -->
<div class="shape entity" style="left:600px;top:140px;">
  <div class="entity-header">Tratamiento</div>
  <div class="entity-properties">
    <div class="entity-property">
      <div class="port port-left"></div>
      <div>id</div>
      <div class="port port-right"></div>
    </div>
    <div class="entity-property">
      <div class="port port-left"></div>
      <div>nombre</div>
      <div class="port port-right"></div>
    </div>
  </div>
</div>

<!-- FLECHAS -->
<div class="arrow" style="left:200px;top:170px;width:120px;"></div>
<div class="arrow" style="left:420px;top:120px;width:80px;transform:rotate(45deg);"></div>
<div class="arrow" style="left:420px;top:260px;width:120px;"></div>

</div>
</body>
</html>
