<svg width="700" height="300" xmlns="http://www.w3.org/2000/svg">

  <style>
    .entity {
      fill: #ffffff;
      stroke: #111827;
      stroke-width: 2;
      rx: 6;
      ry: 6;
    }

    .title {
      font-size: 14px;
      font-weight: bold;
      text-anchor: middle;
    }

    .field {
      font-size: 12px;
      text-anchor: middle;
    }

    .line {
      stroke: #111827;
      stroke-width: 2;
    }
  </style>

  <!-- CLIENTE -->
  <rect class="entity" x="50" y="80" width="180" height="120"></rect>
  <text class="title" x="140" y="105">Cliente</text>
  <text class="field" x="140" y="130">id</text>
  <text class="field" x="140" y="150">nombre</text>
  <text class="field" x="140" y="170">email</text>

  <!-- COMANDA -->
  <rect class="entity" x="400" y="80" width="180" height="120"></rect>
  <text class="title" x="490" y="105">Comanda</text>
  <text class="field" x="490" y="130">id</text>
  <text class="field" x="490" y="150">fecha</text>
  <text class="field" x="490" y="170">cliente_id</text>

  <!-- RELACIÓN Cliente -> Comanda -->
  <line class="line" x1="230" y1="140" x2="400" y2="140"></line>

  <!-- Flecha -->
  <polygon points="400,140 390,135 390,145" fill="#111827"></polygon>

</svg>