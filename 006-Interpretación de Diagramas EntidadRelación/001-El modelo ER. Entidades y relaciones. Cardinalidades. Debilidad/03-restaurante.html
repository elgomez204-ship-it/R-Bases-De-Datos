<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagrama Restaurante</title>
<style>
body {
  margin: 0;
  padding: 20px;
  background: #f3f3f7;
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
}
.page {
  position: relative;
  background: #ffffff;
  border: 1px solid #d1d5db;
  box-shadow: 0 2px 4px rgba(0,0,0,.1);
  width: 852.8625488281248px;
  height: 385.687510172526px;
  overflow: visible;
}

/* formas básicas */
.shape {
  position: absolute;
  min-width: 120px;
  min-height: 40px;
  padding: 6px 10px;
  background: #ffffff;
  border-radius: 4px;
  border: 1px solid #9ca3af;
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}

/* entidades ER */
.shape.entity {
  width: 220px;
  min-height: 80px;
  background: #ffffff;
  border: 2px solid #111827;
  border-radius: 4px;
  box-shadow: 0 2px 4px rgba(0,0,0,.15);
  display: flex;
  flex-direction: column;
  font-size: 13px;
  overflow: hidden;
  padding: 0;
}
.entity-header {
  background: #f3f4f6;
  padding: 4px 8px;
  font-weight: 600;
  text-align: center;
  border-bottom: 1px solid #e5e7eb;
}
.entity-properties {
  flex: 1;
  padding: 4px 4px 0 4px;
}
.entity-property {
  display: grid;
  grid-template-columns: 14px 1fr 14px;
  align-items: center;
  column-gap: 4px;
  padding: 2px 0;
}

/* flechas */
.arrow {
  position: absolute;
  height: 2px;
  background: #111827;
  transform-origin: 0 50%;
}
.arrow::after {
  content: "";
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
  border-left: 8px solid #111827;
}
</style>
</head>

<body>
<div class="page">

<!-- CLIENTE -->
<div class="shape entity" style="left:40px;top:40px;width:220px;height:150px;">
  <div class="entity-header">Cliente</div>
  <div class="entity-properties">
    <div class="entity-property">id</div>
    <div class="entity-property">nombre</div>
    <div class="entity-property">apellidos</div>
    <div class="entity-property">email</div>
  </div>
</div>

<!-- COMANDA -->
<div class="shape entity" style="left:319px;top:44px;width:220px;height:126px;">
  <div class="entity-header">Comanda</div>
  <div class="entity-properties">
    <div class="entity-property">id</div>
    <div class="entity-property">fecha</div>
    <div class="entity-property">cliente_id</div>
  </div>
</div>

<!-- LINEA COMANDA -->
<div class="shape entity" style="left:592px;top:113px;width:220px;height:126px;">
  <div class="entity-header">LineaComanda</div>
  <div class="entity-properties">
    <div class="entity-property">id</div>
    <div class="entity-property">comanda_id</div>
    <div class="entity-property">plato_id</div>
  </div>
</div>

<!-- PLATO -->
<div class="shape entity" style="left:321px;top:219px;width:220px;height:126px;">
  <div class="entity-header">Plato</div>
  <div class="entity-properties">
    <div class="entity-property">id</div>
    <div class="entity-property">nombre</div>
    <div class="entity-property">precio</div>
  </div>
</div>

<!-- FLECHAS -->
<div class="arrow" style="left:198px;top:83px;width:187px;transform:rotate(0.26rad);"></div>
<div class="arrow" style="left:479px;top:88px;width:189px;transform:rotate(0.48rad);"></div>
<div class="arrow" style="left:476px;top:260px;width:178px;transform:rotate(-0.31rad);"></div>

</div>
</body>
</html>
