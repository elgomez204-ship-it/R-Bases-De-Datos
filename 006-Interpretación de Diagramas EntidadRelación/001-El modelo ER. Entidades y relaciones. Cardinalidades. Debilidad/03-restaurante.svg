<svg width="900" height="420" xmlns="http://www.w3.org/2000/svg">

  <style>
    .entity {
      fill: #ffffff;
      stroke: #111827;
      stroke-width: 2;
      rx: 6;
      ry: 6;
    }

    .title {
      font-size: 14px;
      font-weight: bold;
      text-anchor: middle;
    }

    .field {
      font-size: 12px;
      text-anchor: middle;
    }

    .line {
      stroke: #111827;
      stroke-width: 2;
    }

    .arrow {
      fill: #111827;
    }
  </style>

  <!-- CLIENTE -->
  <rect class="entity" x="40" y="60" width="180" height="120"></rect>
  <text class="title" x="130" y="85">Cliente</text>
  <text class="field" x="130" y="110">id</text>
  <text class="field" x="130" y="130">nombre</text>
  <text class="field" x="130" y="150">email</text>

  <!-- COMANDA -->
  <rect class="entity" x="320" y="60" width="180" height="120"></rect>
  <text class="title" x="410" y="85">Comanda</text>
  <text class="field" x="410" y="110">id</text>
  <text class="field" x="410" y="130">fecha</text>
  <text class="field" x="410" y="150">cliente_id</text>

  <!-- LINEA COMANDA -->
  <rect class="entity" x="600" y="140" width="200" height="120"></rect>
  <text class="title" x="700" y="165">LineaComanda</text>
  <text class="field" x="700" y="190">id</text>
  <text class="field" x="700" y="210">comanda_id</text>
  <text class="field" x="700" y="230">plato_id</text>

  <!-- PLATO -->
  <rect class="entity" x="320" y="260" width="180" height="120"></rect>
  <text class="title" x="410" y="285">Plato</text>
  <text class="field" x="410" y="310">id</text>
  <text class="field" x="410" y="330">nombre</text>
  <text class="field" x="410" y="350">precio</text>

  <!-- RELACIONES -->

  <!-- Cliente -> Comanda -->
  <line class="line" x1="220" y1="120" x2="320" y2="120"></line>
  <polygon class="arrow" points="320,120 310,115 310,125"></polygon>

  <!-- Comanda -> LineaComanda -->
  <line class="line" x1="500" y1="120" x2="600" y2="180"></line>
  <polygon class="arrow" points="600,180 590,175 590,185"></polygon>

  <!-- Plato -> LineaComanda -->
  <line class="line" x1="500" y1="320" x2="600" y2="220"></line>
  <polygon class="arrow" points="600,220 590,215 590,225"></polygon>

</svg>