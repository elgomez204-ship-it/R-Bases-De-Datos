      <path d="M0,0 L0,6 L6,3 z" fill="#111827"></path>
    </marker>
  </defs>

  <!-- Caja Usuarios -->
  <rect x="40" y="40" width="220" height="170" fill="#fff" stroke="#111827" stroke-width="2"></rect>
  <rect x="40" y="40" width="220" height="30" fill="#f3f4f6" stroke="#e5e7eb"></rect>

  <text x="150" y="60" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">
