  <text x="335" y="150" font-family="Arial" font-size="12">DNINIE</text>

  <!-- Relación -->
  <line x1="260" y1="120" x2="320" y2="120" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"></line>

</svg>