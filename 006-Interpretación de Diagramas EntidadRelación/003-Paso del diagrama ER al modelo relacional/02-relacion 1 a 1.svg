  </text>

  <text x="55" y="95" font-family="Arial" font-size="12">id</text>
  <text x="55" y="115" font-family="Arial" font-size="12">nombre</text>
  <text x="55" y="135" font-family="Arial" font-size="12">apellidos</text>
  <text x="55" y="155" font-family="Arial" font-size="12">email</text>
