<svg xmlns="http://www.w3.org/2000/svg" width="900" height="350">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#111827"></path>
    </marker>
  </defs>

  <!-- ESTUDIANTE -->
  <rect x="50" y="50" width="220" height="130" fill="#ffffff" stroke="#111827" stroke-width="2"></rect>
  <rect x="50" y="50" width="220" height="30" fill="#f3f4f6"></rect>

  <text x="160" y="70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">
    estudiante
  </text>

  <text x="65" y="105" font-family="Arial" font-size="12">id (PK)</text>
  <text x="65" y="125" font-family="Arial" font-size="12">nombre</text>
  <text x="65" y="145" font-family="Arial" font-size="12">apellidos</text>
  <text x="65" y="165" font-family="Arial" font-size="12">email</text>

  <!-- CURSO -->
  <rect x="350" y="50" width="220" height="120" fill="#ffffff" stroke="#111827" stroke-width="2"></rect>
  <rect x="350" y="50" width="220" height="30" fill="#f3f4f6"></rect>

  <text x="460" y="70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">
    curso
  </text>

  <text x="365" y="105" font-family="Arial" font-size="12">id (PK)</text>
  <text x="365" y="125" font-family="Arial" font-size="12">titulo</text>
  <text x="365" y="145" font-family="Arial" font-size="12">descripcion</text>

  <!-- INSCRIPCION -->
  <rect x="650" y="70" width="220" height="140" fill="#ffffff" stroke="#111827" stroke-width="2"></rect>
  <rect x="650" y="70" width="220" height="30" fill="#f3f4f6"></rect>

  <text x="760" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">
    inscripcion
  </text>

  <text x="665" y="125" font-family="Arial" font-size="12">id (PK)</text>
  <text x="665" y="145" font-family="Arial" font-size="12">id_estudiante (FK)</text>
  <text x="665" y="165" font-family="Arial" font-size="12">id_curso (FK)</text>
  <text x="665" y="185" font-family="Arial" font-size="12">atributo</text>

  <!-- RELACIONES -->
  <line x1="270" y1="120" x2="650" y2="130" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"></line>

  <line x1="570" y1="120" x2="650" y2="160" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"></line>

  <!-- cardinalidad -->
  <text x="280" y="110" font-size="12">1</text>
  <text x="630" y="110" font-size="12">N</text>

  <text x="580" y="110" font-size="12">1</text>
  <text x="630" y="150" font-size="12">N</text>

</svg>