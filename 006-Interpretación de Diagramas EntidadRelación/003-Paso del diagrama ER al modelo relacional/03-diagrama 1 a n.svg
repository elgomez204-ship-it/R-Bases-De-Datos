<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#111827"></path>
    </marker>
  </defs>

  <!-- Tabla Usuarios -->
  <rect x="50" y="50" width="220" height="120" fill="#ffffff" stroke="#111827" stroke-width="2"></rect>
  <rect x="50" y="50" width="220" height="30" fill="#f3f4f6" stroke="#e5e7eb"></rect>

  <text x="160" y="70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">
    Usuarios
  </text>

  <text x="65" y="105" font-family="Arial" font-size="12">id (PK)</text>
  <text x="65" y="125" font-family="Arial" font-size="12">nombre</text>
  <text x="65" y="145" font-family="Arial" font-size="12">apellidos</text>

  <!-- Tabla contacto_usuario -->
  <rect x="450" y="50" width="260" height="140" fill="#ffffff" stroke="#111827" stroke-width="2"></rect>
  <rect x="450" y="50" width="260" height="30" fill="#f3f4f6" stroke="#e5e7eb"></rect>

  <text x="580" y="70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">
    contacto_usuario
  </text>

  <text x="465" y="105" font-family="Arial" font-size="12">id (PK)</text>
  <text x="465" y="125" font-family="Arial" font-size="12">id_usuario (FK)</text>
  <text x="465" y="145" font-family="Arial" font-size="12">tipo</text>
  <text x="465" y="165" font-family="Arial" font-size="12">valor</text>

  <!-- Relación -->
  <line x1="270" y1="120" x2="450" y2="120" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"></line>

  <!-- Cardinalidad -->
  <text x="280" y="110" font-family="Arial" font-size="12">1</text>
  <text x="430" y="110" font-family="Arial" font-size="12">N</text>

</svg>